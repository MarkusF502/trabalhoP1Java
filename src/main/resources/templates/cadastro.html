<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Jogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cadastrar Novo Jogo</h4>
                </div>
                <div class="card-body">
                    
                    <form th:action="@{/salvar}" th:object="${jogo}" method="POST">
                        
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título do Jogo</label>
                            <input type="text" id="titulo" class="form-control" th:field="*{titulo}" required placeholder="Ex: The Witcher 3">
                        </div>

                        <div class="mb-3">
                            <label for="plataforma" class="form-label">Plataforma</label>
                            <input type="text" id="plataforma" class="form-control" th:field="*{plataforma}" required placeholder="Ex: PC, PS5, Xbox">
                        </div>

                        <div class="mb-3">
                            <label for="anoLancamento" class="form-label">Ano de Lançamento</label>
                            <input type="number" id="anoLancamento" class="form-control" th:field="*{anoLancamento}" required placeholder="Ex: 2015">
                        </div>

                        <div class="mb-4">
                            <label for="genero" class="form-label">Gênero</label>
                            <input type="text" id="genero" class="form-control" th:field="*{genero}" required placeholder="Ex: RPG, Ação, Corrida">
                        </div>

                        <input type="hidden" th:field="*{id}" />

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Salvar Jogo</button>
                        </div>
                        
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
