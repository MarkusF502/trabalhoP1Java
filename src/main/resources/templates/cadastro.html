<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Jogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cadastrar Novo Jogo</h4>
                </div>
                <div class="card-body mt-3">
                    
                    <form th:action="@{/salvar}" th:object="${jogo}" method="POST">
                        
                        <div class="grupo-input">
                            <input type="text" id="titulo" class="input" th:field="*{titulo}" required>
                            <label for="titulo" class="user-label">Título</label>
                        </div>

                        <div class="grupo-input">
                            <input type="text" id="plataforma" class="input" th:field="*{plataforma}" required>
                            <label for="plataforma" class="user-label">Plataforma</label>
                        </div>

                        <div class="grupo-input">
                            <input type="number" id="anoLancamento" class="input" th:field="*{anoLancamento}" required>
                            <label for="anoLancamento" class="user-label">Ano de Lançamento</label>
                        </div>

                        <div class="grupo-input">
                            <input type="text" id="genero" class="input" th:field="*{genero}" required>
                            <label for="genero" class="user-label">Gênero</label>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Salvar Jogo</button>
                        </div>
                        
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
