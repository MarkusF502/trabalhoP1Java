<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Jogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        .input-custom {
            border: 2px solid transparent;
            width: 100%;
            height: 2.8em;
            padding-left: 0.8em;
            outline: none;
            overflow: hidden;
            background-color: #F3F3F3;
            border-radius: 10px;
            transition: all 0.5s;
        }

        .input-custom:hover,
        .input-custom:focus {
            border: 2px solid #4A9DEC;
            box-shadow: 0px 0px 0px 7px rgba(74, 157, 236, 0.2);
            background-color: white;
        }

        .input-custom.is-invalid {
            border: 2px solid #dc3545;
            background-color: #fff8f8;
        }
        
        .input-custom.is-invalid:focus {
            box-shadow: 0px 0px 0px 7px rgba(220, 53, 69, 0.2);
        }

        .select2-container--default .select2-selection--multiple {
            border: 2px solid transparent !important;
            background-color: #F3F3F3 !important;
            border-radius: 10px !important;
            min-height: 2.8em !important;
            padding-left: 0.4em !important;
            transition: all 0.5s !important;
            outline: none !important;
        }

        .select2-container--default.select2-container--focus .select2-selection--multiple,
        .select2-container--default .select2-selection--multiple:hover {
            border: 2px solid #4A9DEC !important;
            box-shadow: 0px 0px 0px 7px rgba(74, 157, 236, 0.2) !important;
            background-color: white !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #e9ecef !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 4px 8px !important;
            margin-top: 6px !important;
            margin-right: 6px !important;
            display: inline-flex !important;
            flex-direction: row-reverse !important;
            align-items: center !important;
            float: left !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            margin-right: 0 !important;
            margin-left: 8px !important;
            color: #6c757d !important;
            border-right: none !important;
            border-left: 1px solid #ced4da !important;
            padding-right: 0 !important;
            padding-left: 6px !important;
            font-weight: bold !important;
            border-radius: 0 !important;
        }

        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover {
            background-color: transparent !important;
            color: #dc3545 !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px; border-radius: 15px;">
        <div class="card-header bg-dark text-white" style="border-top-left-radius: 15px; border-top-right-radius: 15px;">
            <h3 class="mb-0 pt-2 pb-2 text-center" th:text="${jogo.id == null ? 'Cadastrar Novo Jogo' : 'Editar Jogo'}">Cadastro</h3>
        </div>
        <div class="card-body p-4">
            
            <form th:action="@{/salvar}" th:object="${jogo}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-4">
                    <label for="titulo" class="form-label fw-bold text-secondary">Título do Jogo</label>
                    <input type="text" class="input-custom" id="titulo" th:field="*{titulo}" 
                           th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''" placeholder="Ex: The Last of Us">
                    <div th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}" class="text-danger small mt-1"></div>
                </div>

                <div class="mb-4">
                    <label for="file" class="form-label fw-bold text-secondary">Capa do Jogo</label>
                    <input class="form-control" type="file" id="file" name="file" accept="image/*" style="border-radius: 10px; background-color: #F3F3F3; border: 2px solid transparent;">
                    <div th:if="${jogo.urlCapa != null}" class="text-muted small mt-1">Este jogo já possui uma capa salva. Envie outra para substituir.</div>
                </div>

                <div class="mb-4">
                    <label for="anoLancamento" class="form-label fw-bold text-secondary">Ano de Lançamento</label>
                    <input type="number" class="input-custom" id="anoLancamento" th:field="*{anoLancamento}" 
                           th:classappend="${#fields.hasErrors('anoLancamento')} ? 'is-invalid' : ''" placeholder="Ex: 2013">
                    <div th:if="${#fields.hasErrors('anoLancamento')}" th:errors="*{anoLancamento}" class="text-danger small mt-1"></div>
                </div>

                <div class="mb-4">
                    <label for="plataforma" class="form-label fw-bold text-secondary d-block">Plataformas Disponíveis</label>
                    <select id="plataforma" multiple="multiple" class="form-control select-tags" th:field="*{plataforma}">
                        <option th:each="plat : ${todasPlataformas}" th:value="${plat}" th:text="${plat}"></option>
                        <option th:if="${jogo.plataforma != null}" th:each="platCustom : ${jogo.plataforma}" 
                                th:unless="${todasPlataformas.contains(platCustom)}" 
                                th:value="${platCustom}" th:text="${platCustom}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('plataforma')}" class="text-danger small mt-1" th:errors="*{plataforma}"></div>
                </div>

                <div class="mb-5">
                    <label for="genero" class="form-label fw-bold text-secondary d-block">Gêneros</label>
                    <select id="genero" multiple="multiple" class="form-control select-tags" th:field="*{genero}">
                        <option th:each="gen : ${todosGeneros}" th:value="${gen}" th:text="${gen}"></option>
                        <option th:if="${jogo.genero != null}" th:each="genCustom : ${jogo.genero}" 
                                th:unless="${todosGeneros.contains(genCustom)}" 
                                th:value="${genCustom}" th:text="${genCustom}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('genero')}" class="text-danger small mt-1" th:errors="*{genero}"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <a th:href="@{/}" class="btn btn-outline-secondary px-4 fw-bold" style="border-radius: 10px;">Voltar</a>
                    <button type="submit" class="btn btn-primary px-5 fw-bold" style="border-radius: 10px; background-color: #4A9DEC; border-color: #4A9DEC;">Salvar Jogo</button>
                </div>
            </form>
            
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
    $(document).ready(function() {
        $('.select-tags').select2({
            tags: true,
            tokenSeparators: [',', ' '],
            placeholder: "Selecione na lista ou digite para adicionar...",
            width: '100%'
        });
    });
</script>

</body>
</html>
