<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Catálogo de Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .input-custom {
            border: 2px solid transparent;
            width: 100%;
            height: 2.8em;
            padding-left: 0.8em;
            outline: none;
            overflow: hidden;
            background-color: #F3F3F3;
            border-radius: 10px;
            transition: all 0.5s;
        }

        .input-custom:hover,
        .input-custom:focus {
            border: 2px solid #4A9DEC;
            box-shadow: 0px 0px 0px 7px rgba(74, 157, 236, 0.2);
            background-color: white;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm mx-auto" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="card-header bg-dark text-white" style="border-top-left-radius: 15px; border-top-right-radius: 15px;">
            <h3 class="mb-0 pt-2 pb-2 text-center">Entrar</h3>
        </div>
        <div class="card-body p-4">
            
            <div th:if="${param.error}" class="alert alert-danger text-center small">
                E-mail ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info text-center small">
                Você saiu do sistema com sucesso.
            </div>
            <div th:if="${param.sucesso}" class="alert alert-success text-center small">
                Conta criada! Faça login para continuar.
            </div>

            <form th:action="@{/login}" method="post">
                
                <div class="mb-4">
                    <label for="username" class="form-label fw-bold text-secondary">E-mail</label>
                    <input type="email" class="input-custom" id="username" name="username" required placeholder="Seu e-mail cadastrado">
                </div>

                <div class="mb-5">
                    <label for="password" class="form-label fw-bold text-secondary">Senha</label>
                    <input type="password" class="input-custom" id="password" name="password" required placeholder="Sua senha">
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold mb-4" style="border-radius: 10px; background-color: #4A9DEC; border-color: #4A9DEC; height: 2.8em;">Entrar</button>
                
                <div class="text-center">
                    <span class="text-secondary small">Não tem uma conta?</span>
                    <a th:href="@{/registro}" class="text-decoration-none fw-bold" style="color: #4A9DEC;">Cadastre-se aqui</a>
                </div>
            </form>
            
        </div>
    </div>

</body>
</html>
