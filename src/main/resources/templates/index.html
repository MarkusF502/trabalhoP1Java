<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Catálogo de Jogos</h2>
        <form th:action="@{/cadastro}" method="get" class="m-0">
            <button type="submit" class="btn btn-success">
                + Cadastrar novo jogo
            </button>
        </form>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Título</th>
                        <th>Plataforma</th>
                        <th>Ano</th>
                        <th>Gênero</th>
                        <th class="text-center">Ações</th> </tr>
                </thead>
                <tbody>
                    <tr th:each="jogo : ${jogos}">
                        <td th:text="${jogo.titulo}">-</td>
                        <td th:text="${jogo.plataforma}">-</td>
                        <td th:text="${jogo.anoLancamento}">-</td>
                        <td th:text="${jogo.genero}">-</td>
                        <td class="text-center">
                            
                            <form th:action="@{/editar/{id}(id=${jogo.id})}" method="get" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-primary">Editar</button>
                            </form>
                            
                            <form th:action="@{/excluir/{id}(id=${jogo.id})}" method="get" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                            </form>

                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(jogos)}" class="text-center text-muted mt-3">
                <p>Nenhum jogo cadastrado</p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
