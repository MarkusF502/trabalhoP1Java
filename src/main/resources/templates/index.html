<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Catálogo de Jogos</h2>
        <a th:href="@{/cadastro}" class="btn btn-success">
            + Cadastrar novo jogo
        </a>
    </div>

    <div th:if="${#lists.isEmpty(jogos)}" class="text-center text-muted mt-5">
        <p class="fs-4">Nenhum jogo cadastrado.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mt-2">
        
        <div class="col d-flex justify-content-center" th:each="jogo : ${jogos}">
            
            <div class="card-jogo">
                
                <div class="card-titulo-inicial">
                    <h4 class="mb-0 px-2 text-center text-truncate w-100" th:text="${jogo.titulo}">Título</h4>
                </div>

                <div class="card-conteudo text-start">
                    
                    <h6 class="text-truncate border-bottom border-dark pb-2 mb-3 fw-bold" th:text="${jogo.titulo}">Título</h6>
                    
                    <div class="flex-grow-1">
                        <small class="fw-bold d-block">Plataforma:</small>
                        <div class="mb-2 text-truncate" th:text="${jogo.plataforma}">-</div>
                        
                        <small class="fw-bold d-block">Ano:</small>
                        <div class="mb-2" th:text="${jogo.anoLancamento}">-</div>
                        
                        <small class="fw-bold d-block">Gênero:</small>
                        <div class="text-truncate" th:text="${jogo.genero}">-</div>
                    </div>
                    
                    <div class="mt-2">
                        <a th:href="@{/deletar/{id}(id=${jogo.id})}" 
                           class="btn btn-danger btn-sm w-100 shadow-sm" 
                           onclick="return confirm('Tem certeza que deseja excluir este jogo?');">
                            Excluir
                        </a>
                    </div>

                </div>
            </div>

        </div>
        
    </div>
</div>

</body>
</html>
