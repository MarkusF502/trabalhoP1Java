<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Catálogo de Jogos</h2>
        <a th:href="@{/cadastro}" class="btn btn-success">
            + Cadastrar novo jogo
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Título</th>
                        <th>Plataforma</th>
                        <th>Ano</th>
                        <th>Gênero</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="jogo : ${jogos}">
                        <td th:text="${jogo.titulo}">-</td>
                        <td th:text="${jogo.plataforma}">-</td>
                        <td th:text="${jogo.anoLancamento}">-</td>
                        <td th:text="${jogo.genero}">-</td>
                        <td>
                            <a th:href="@{/deletar/{id}(id=${jogo.id})}" 
                               class="btn btn-danger btn-sm" 
                               onclick="return confirm('Tem certeza que deseja excluir este jogo?');">
                               Excluir
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(jogos)}" class="text-center text-muted mt-3">
                <p>Nenhum jogo cadastrado</p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
